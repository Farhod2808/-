<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siz uchun maxsus taklif ✨</title>
    <style>
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #faf6f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 85%;
            transition: all 0.3s ease;
        }

        h1 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .compliment {
            color: #e74c3c;
            font-style: italic;
            font-size: 14px;
            margin-bottom: 25px;
            min-height: 20px;
            font-weight: 500;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            align-items: center;
            width: 100%;
        }

        button {
            padding: 14px 20px;
            font-size: 16px;
            border: 1px solid #f0f0f0;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 500;
            background-color: #fff;
            color: #4a4a4a;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        button:hover {
            background-color: #fdf2f2;
            border-color: #ffb3b3;
            color: #e74c3c;
        }

        .runaway-btn {
            background-color: #fbfbfb;
            color: #95a5a6;
        }

        .custom-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 8px;
            text-align: center;
            transition: border-color 0.2s;
        }

        .custom-input:focus {
            border-color: #e74c3c;
        }
    </style>
</head>
<body>

    <div class="container" id="quizBox">
        <h1 id="question">Men bilan uchrashuvga chiqasizmi?</h1>
        <div class="compliment" id="complimentText">Kunlarimni yanada mazmunli qilishingiz mumkin bo'lgan yagona insonsiz.</div>
        
        <div class="options-container" id="optionsBox">
            </div>
    </div>

    <script>
        const optionsBox = document.getElementById('optionsBox');
        const questionText = document.getElementById('question');
        const complimentText = document.getElementById('complimentText');

        // ⚠️ DIQQAT! FAQAT SHU IKKI QATOR ICHIDAGI MATNNI O'ZGARTIRING, QO'SHTIRNOQLAR QOLSIN!
        const TELEGRAM_BOT_TOKEN = 'BU_YERGA_BOT_TOKEN_QOYING'; 
        const TELEGRAM_CHAT_ID = 'BU_YERGA_CHAT_ID_QOYING';

        let userAnswers = {
            step1: "Ha (Rozi bo'ldi)",
            step2: "",
            step3: ""
        };

        function moveButton(btn) {
            const maxWidth = window.innerWidth - btn.offsetWidth - 40;
            const maxHeight = window.innerHeight - btn.offsetHeight - 40;

            const randomX = Math.floor(Math.random() * maxWidth);
            const randomY = Math.floor(Math.random() * maxHeight);

            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.zIndex = '1000';
            btn.style.width = 'auto';
        }

        function loadStep(step) {
            optionsBox.innerHTML = '';
            
            if (step === 1) {
                questionText.innerText = "Men bilan uchrashuvga chiqasizmi?";
                complimentText.innerText = "Kunlarimni yanada mazmunli qilishingiz mumkin bo'lgan yagona insonsiz.";

                let yesBtn = document.createElement('button');
                yesBtn.innerText = "Ha";
                yesBtn.onclick = () => loadStep(2);

                let noBtn = document.createElement('button');
                noBtn.innerText = "Yo'q";
                noBtn.className = "runaway-btn";
                noBtn.onmouseover = () => moveButton(noBtn);
                noBtn.onclick = () => moveButton(noBtn);

                optionsBox.appendChild(yesBtn);
                optionsBox.appendChild(noBtn);
            } 
            else if (step === 2) {
                questionText.innerText = "Yaxshi, unda qaysi sanani tanlaymiz?";
                complimentText.innerText = "Sizda qandaydir ichki bir xotirjamlik va samimiylik bor, bu juda jalb qiladi.";

                let opt1 = document.createElement('button');
                opt1.innerText = "Shu hafta biron kun ishdan keyin";
                opt1.onclick = () => { userAnswers.step2 = opt1.innerText; loadStep(3); };

                let opt2 = document.createElement('button');
                opt2.innerText = "Shu hafta oxiri yakshanba kuni";
                opt2.onclick = () => { userAnswers.step2 = opt2.innerText; loadStep(3); };

                let opt3 = document.createElement('button');
                opt3.innerText = "Mening umuman vaqtim yo'q";
                opt3.className = "runaway-btn";
                opt3.onmouseover = () => moveButton(opt3);
                opt3.onclick = () => moveButton(opt3);

                optionsBox.appendChild(opt1);
                optionsBox.appendChild(opt2);
                optionsBox.appendChild(opt3);
            } 
            else if (step === 3) {
                questionText.innerText = "Siz juda ajoyib harakat qilyapsiz! Qayerga boramiz?";
                complimentText.innerText = "Didingiz va dunyoqarashingiz doim meni hayratda qoldiradi.";

                let customInput = document.createElement('input');
                customInput.type = "text";
                customInput.placeholder = "O'zingiz xohlagan joyni yozing...";
                customInput.className = "custom-input";
                customInput.id = "userPlace";

                let opt1 = document.createElement('button');
                opt1.innerText = "Shunchaki ko'rishib aylanishga";
                
                let opt2 = document.createElement('button');
                opt2.innerText = "Biron joyda o'tirib gaplashishga";

                let opt3 = document.createElement('button');
                opt3.innerText = "Uzr! Men baribir borolmayman";
                opt3.className = "runaway-btn";
                opt3.onmouseover = () => moveButton(opt3);
                opt3.onclick = () => moveButton(opt3);

                opt1.onclick = () => { 
                    let textVal = document.getElementById('userPlace').value;
                    userAnswers.step3 = textVal ? `O'zi yozdi: "${textVal}"` : opt1.innerText;
                    sendResultsTelegram();
                };
                
                opt2.onclick = () => { 
                    let textVal = document.getElementById('userPlace').value;
                    userAnswers.step3 = textVal ? `O'zi yozdi: "${textVal}"` : opt2.innerText;
                    sendResultsTelegram();
                };

                optionsBox.appendChild(customInput);
                optionsBox.appendChild(opt1);
                optionsBox.appendChild(opt2);
                optionsBox.appendChild(opt3);
            } 
            else if (step === 4) {
                questionText.innerText = "Kelishdik! ✨";
                complimentText.innerText = "Siz bilan suhbatlashish — men uchun haftaning eng kutilgan qismi bo'ladi.";
                
                let finalMsg = document.createElement('p');
                finalMsg.style.fontSize = "16px";
                finalMsg.style.color = "#7f8c8d";
                finalMsg.style.lineHeight = "1.5";
                finalMsg.innerText = "Tez orada barcha tafsilotlarni kelishib olamiz. Vaqt ajratganingiz uchun rahmat! 😉";
                
                optionsBox.appendChild(finalMsg);
            }
        }

        function sendResultsTelegram() {
            const message = `🔔 *Yangi javob keldi!*\n\n` +
                            `1. Uchrashuvga chiqasizmi?: ${userAnswers.step1}\n` +
                            `2. Qaysi sana?: ${userAnswers.step2}\n` +
                            `3. Qayerga boriladi?: ${userAnswers.step3}`;

            const url = `https://api.telegram.org/bot${8820143337:AAEG4yo61jHOYQKd8It4dd4_Bkbp-K42wyU}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: 1311736668,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => { loadStep(4); })
            .catch((error) => {
                console.log('Telegram xatoligi, lekin sayt davom etadi:', error);
                loadStep(4); 
            });
        }

        // Muammolarni oldini olish uchun xatolikni ushlash
        try {
            loadStep(1);
        } catch(e) {
            console.error("Yuklanishda xatolik:", e);
        }
    </script>

</body>
</html>
