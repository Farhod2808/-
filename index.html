            opacity: 0.15;
            animation: floatAnimation 12s linear infinite;
            bottom: -50px;

            z-index: 1;
        }

            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {

            }

                opacity: 0.2;
            }
