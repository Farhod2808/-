<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Quiz Interaction ✨</title>
    <style>
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #2C3E50;
            position: relative;
            /* Anime/Multfilm uslubidagi osmon foni */
            background: linear-gradient(to bottom, #e0f2fe 0%, #fef08a 60%, #fef9c3 100%);
        }

        /* Multfilm uslubidagi harakatlanuvchi bulutlar */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            pointer-events: none;
            z-index: 1;
            animation: moveClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
        }
        .cloud::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud::after { width: 30px; height: 30px; top: -10px; right: 15px; }

        @keyframes moveClouds {
            0% { transform: translateX(-150px); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateX(calc(100vw + 150px)); opacity: 0; }
        }

        /* Orqa fondagi nozik premium uchqunlar */
        .sparkle {
            position: absolute;
            pointer-events: none;
            background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, rgba(212,175,55,0) 70%);
            border-radius: 50%;
            animation: floatSparkle 6s infinite ease-in-out;
            z-index: 2;
        }
        @keyframes floatSparkle {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 0.6; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 35px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.1), 
                        0 5px 15px rgba(0, 0, 0, 0.02);
            max-width: 380px;
            width: 85%;
            transition: all 0.4s ease;
            position: relative;
            z-index: 10;
        }

        h1 {
            background: linear-gradient(135deg, #2c3e50 0%, #ad8b28 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 23px;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.4;
        }

        .compliment {
            color: #e74c3c;
            font-style: italic;
            font-size: 14.5px;
            margin-bottom: 35px;
            min-height: 22px;
            font-weight: 400;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            align-items: center;
            width: 100%;
        }

        button {
            padding: 15px 22px;
            font-size: 16px;
            border: 1px solid #EAEAEA;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 500;
            background-color: #FFFFFF;
            color: #4A4A4A;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        button.primary-btn {
            background-color: #FDFBF4;
            border-color: rgba(212, 175, 55, 0.5);
            color: #b08d2b;
            font-weight: 600;
        }

        button:hover {
            background-color: #FDFBF4;
            border-color: #D4AF37;
            color: #D4AF37;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }

        .runaway-btn {
            background-color: #FBFBFB;
            color: #95a5a6;
            border: 1px solid #F0F0F0;
            font-weight: 400;
            transition: left 0.15s ease, top 0.15s ease, transform 0.1s ease !important;
        }

        .custom-input {
            width: 100%;
            padding: 15px 22px;
            font-size: 16px;
            border: 1px solid #E0E0E0;
            border-radius: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 4px;
            text-align: center;
            color: #2C3E50;
            transition: all 0.2s;
            background-color: #FAFAFA;
        }

        .custom-input:focus {
            border-color: #D4AF37;
            background-color: #FFFFFF;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }

        .submit-custom-btn {
            background-color: #FDFBF4;
            border-color: #D4AF37;
            color: #D4AF37;
            font-weight: 600;
        }

        #finalMsg {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.5;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <script>
        const cloudParams = [
            { width: 90, height: 30, top: 10, speed: 25 },
            { width: 120, height: 40, top: 25, speed: 35 },
            { width: 80, height: 25, top: 70, speed: 20 }
        ];
        cloudParams.forEach((p, idx) => {
            let cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.width = p.width + 'px';
            cloud.style.height = p.height + 'px';
            cloud.style.top = p.top + 'vh';
            cloud.style.animationDuration = p.speed + 's';
            cloud.style.animationDelay = (idx * 5) + 's';
            document.body.appendChild(cloud);
        });

        for (let i = 0; i < 3; i++) {
            let sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.width = Math.random() * 150 + 80 + 'px';
            sparkle.style.height = sparkle.style.width;
            sparkle.style.left = Math.random() * 80 + 10 + 'vw';
            sparkle.style.top = Math.random() * 80 + 10 + 'vh';
            sparkle.style.animationDelay = i * 2 + 's';
            document.body.appendChild(sparkle);
        }
    </script>

    <div class="container" id="quizBox">
        <h1 id="question">Выберите язык / Тилни танlang</h1>
        <div class="compliment" id="complimentText" style="color: #7f8c8d;">✨</div>
        
        <div class="options-container" id="optionsBox">
            </div>
    </div>

    <script>
        const optionsBox = document.getElementById('optionsBox');
        const questionText = document.getElementById('question');
        const complimentText = document.getElementById('complimentText');

        const TELEGRAM_BOT_TOKEN = '8820143337:AAEG4yo61jHOYQKd8It4dd4_Bkbp-K42wyU'; 
        const TELEGRAM_CHAT_ID = '1311736668';

        let currentLang = 'uz'; // Tanlangan til

        // Ikki tildagi matnlar bazasi
        const locales = {
            uz: {
                step1_q: "Men bilan uchrashuvga chiqasanmi?",
                step1_c: "Kunlarimni yanada mazmunli qilishingiz mumkin bo'lgan yagona insonsiz.",
                step1_yes: "Да",
                step1_no: "Нет",
                step2_q: "Ajoyib, unda qaysi kunni tanlaymiz?",
                step2_c: "Sizda qandaydir ichki xotirjamlik va samimiylik bor, bular meni juda jalb qiladi.",
                step2_o1: "Shu hafta ishdan keyin biron kun",
                step2_o2: "Shu dam olish kunlari, yakshanba kuni",
                step2_o3: "Menda umuman vaqt yo'q",
                step3_q: "Ajoyib tanlov! Qayerga boramiz?",
                step3_c: "Sizning didingiz va dunyoqarashingiz meni har doim hayratda qoldiradi.",
                step3_placeholder: "Xohlasangiz, o'z variantingizni yozing...",
                step3_custom_btn: "Mening variantimni tanlash",
                step3_o1: "Shunchaki aylanib, suhbatlashamiz",
                step3_o2: "Shinamgina joyda o'tiramiz",
                step3_o3: "Kechirasiz, baribir bora olmayman",
                step4_q: "Kelishtik! ✨",
                step4_c: "Siz bilan uchrashish haftamning eng yaxshi qismiga aylanadi.",
                step4_f: "Tez orada barcha tafsilotlarni kelishib olamiz. Javoblaringiz uchun rahmat! 😉",
                tg_title: "Yangi javob tushdi!",
                tg_q1: "Uchrashuvga chiqadimi?",
                tg_q2: "Qaysi sana?",
                tg_q3: "Qayerga borasizlar?",
                tg_ans_yes: "Да (Rozilik bildirdi)"
            },
            ru: {
                step1_q: "Пойдёшь со мной на свидание?",
                step1_c: "Каждая минута, проведённая с тобой, приносит в мою жизнь особое тепло.",
                step1_yes: "Да",
                step1_no: "Нет",
                step2_q: "Отлично, тогда какую дату выберем?",
                step2_c: "В тебе есть какое-то внутреннее спокойствие и искренность, которые очень притягивают.",
                step2_o1: "Как-нибудь на этой неделе после работы",
                step2_o2: "В эти выходные, в воскресенье",
                step2_o3: "У меня вообще нет времени",
                step3_q: "Прекрасный выбор! Куда пойдём?",
                step3_c: "Твой вкус и взгляд на мир всегда приятно удивляют меня.",
                step3_placeholder: "Напиши свой variant, если хочешь...",
                step3_custom_btn: "Выбрать мой вариант",
                step3_o1: "Просто прогуляемся и пообщаемся",
                step3_o2: "Посидим где-нибудь в уютном месте",
                step3_o3: "Извини, я всё равно не смогу пойти",
                step4_q: "Договорились! ✨",
                step4_c: "Встреча с тобой станет лучшей частью моей недели.",
                step4_f: "Скоро согласуем все детали. Спасибо за твои ответы! 😉",
                tg_title: "Новый ответ на свидание!",
                tg_q1: "Пойдёшь на свидание?",
                tg_q2: "Какая дата?",
                tg_q3: "Куда пойдёте?",
                tg_ans_yes: "Да (Согласилась)"
            }
        };

        let userAnswers = {
            lang: "",
            step1: "",
            step2: "",
            step3: ""
        };

        function moveButton(btn) {
            const padding = 30;
            const maxWidth = window.innerWidth - btn.offsetWidth - padding;
            const maxHeight = window.innerHeight - btn.offsetHeight - padding;

            let randomX = Math.floor(Math.random() * (maxWidth - padding)) + padding;
            let randomY = Math.floor(Math.random() * (maxHeight - padding)) + padding;

            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.zIndex = '1000';
            btn.style.width = 'auto';
        }

        // Birinchi bosqich: Tilni tanlash
        function loadLangStep() {
            optionsBox.innerHTML = '';
            
            let uzBtn = document.createElement('button');
            uzBtn.innerText = "O'zbekcha 🇺🇿";
            uzBtn.className = "primary-btn";
            uzBtn.onclick = () => { 
                currentLang = 'uz'; 
                userAnswers.lang = "O'zbekcha";
                userAnswers.step1 = locales.uz.tg_ans_yes;
                loadStep(1); 
            };

            let ruBtn = document.createElement('button');
            ruBtn.innerText = "Русский 🇷🇺";
            ruBtn.className = "primary-btn";
            ruBtn.onclick = () => { 
                currentLang = 'ru'; 
                userAnswers.lang = "Русский";
                userAnswers.step1 = locales.ru.tg_ans_yes;
                loadStep(1); 
            };

            optionsBox.appendChild(uzBtn);
            optionsBox.appendChild(ruBtn);
        }

        function loadStep(step) {
            optionsBox.innerHTML = '';
            const text = locales[currentLang]; // Faol til matnlari
            
            if (step === 1) {
                complimentText.style.color = '#e74c3c'; // Kompliment rangini o'z holiga qaytarish
                questionText.innerText = text.step1_q;
                complimentText.innerText = text.step1_c;

                let yesBtn = document.createElement('button');
                yesBtn.innerText = text.step1_yes;
                yesBtn.className = "primary-btn";
                yesBtn.onclick = () => loadStep(2);

                let noBtn = document.createElement('button');
                noBtn.innerText = text.step1_no;
                noBtn.className = "runaway-btn";
                noBtn.onmouseover = () => moveButton(noBtn);
                noBtn.onclick = () => moveButton(noBtn);

                optionsBox.appendChild(yesBtn);
                optionsBox.appendChild(noBtn);
            } 
            else if (step === 2) {
                questionText.innerText = text.step2_q;
                complimentText.innerText = text.step2_c;

                let opt1 = document.createElement('button');
                opt1.className = "primary-btn";
                opt1.innerText = text.step2_o1;
                opt1.onclick = () => { userAnswers.step2 = opt1.innerText; loadStep(3); };

                let opt2 = document.createElement('button');
                opt2.className = "primary-btn";
                opt2.innerText = text.step2_o2;
                opt2.onclick = () => { userAnswers.step2 = opt2.innerText; loadStep(3); };

                let opt3 = document.createElement('button');
                opt3.innerText = text.step2_o3;
                opt3.className = "runaway-btn";
                opt3.onmouseover = () => moveButton(opt3);
                opt3.onclick = () => moveButton(opt3);

                optionsBox.appendChild(opt1);
                optionsBox.appendChild(opt2);
                optionsBox.appendChild(opt3);
            } 
            else if (step === 3) {
                questionText.innerText = text.step3_q;
                complimentText.innerText = text.step3_c;

                let customInput = document.createElement('input');
                customInput.type = "text";
                customInput.placeholder = text.step3_placeholder;
                customInput.className = "custom-input";
                customInput.id = "userPlace";

                let dynamicButtonsWrapper = document.createElement('div');
                dynamicButtonsWrapper.style.width = "100%";
                dynamicButtonsWrapper.style.display = "flex";
                dynamicButtonsWrapper.style.flexDirection = "column";
                dynamicButtonsWrapper.style.gap = "14px";

                function renderThirdStepButtons() {
                    dynamicButtonsWrapper.innerHTML = '';
                    const textVal = customInput.value.trim();

                    if (textVal !== "") {
                        let submitBtn = document.createElement('button');
                        submitBtn.innerText = text.step3_custom_btn;
                        submitBtn.className = "submit-custom-btn";
                        submitBtn.onclick = () => {
                            userAnswers.step3 = currentLang === 'uz' ? `O'z varianti: "${textVal}"` : `Свой вариант: "${textVal}"`;
                            sendResultsTelegram();
                        };
                        dynamicButtonsWrapper.appendChild(submitBtn);
                    } else {
                        let opt1 = document.createElement('button');
                        opt1.innerText = text.step3_o1;
                        opt1.onclick = () => { userAnswers.step3 = opt1.innerText; sendResultsTelegram(); };

                        let opt2 = document.createElement('button');
                        opt2.innerText = text.step3_o2;
                        opt2.onclick = () => { userAnswers.step3 = opt2.innerText; sendResultsTelegram(); };

                        let opt3 = document.createElement('button');
                        opt3.innerText = text.step3_o3;
                        opt3.className = "runaway-btn";
                        opt3.onmouseover = () => moveButton(opt3);
                        opt3.onclick = () => moveButton(opt3);

                        dynamicButtonsWrapper.appendChild(opt1);
                        dynamicButtonsWrapper.appendChild(opt2);
                        dynamicButtonsWrapper.appendChild(opt3);
                    }
                }

                customInput.oninput = renderThirdStepButtons;

                optionsBox.appendChild(customInput);
                optionsBox.appendChild(dynamicButtonsWrapper);
                renderThirdStepButtons();
            } 
            else if (step === 4) {
                questionText.innerText = text.step4_q;
                complimentText.innerText = text.step4_c;
                
                let finalMsg = document.createElement('p');
                finalMsg.id = "finalMsg";
                finalMsg.innerText = text.step4_f;
                
                optionsBox.appendChild(finalMsg);
            }
        }

        function sendResultsTelegram() {
            const text = locales[currentLang];
            const message = `🔔 *${text.tg_title}*\n\n` +
                            `🌐 Til / Язык: ${userAnswers.lang}\n` +
                            `1. ${text.tg_q1}: ${userAnswers.step1}\n` +
                            `2. ${text.tg_q2}: ${userAnswers.step2}\n` +
                            `3. ${text.tg_q3}: ${userAnswers.step3}`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => { loadStep(4); })
            .catch((error) => {
                console.log('Telegram error:', error);
                loadStep(4); 
            });
        }

        try {
            loadLangStep(); // Til tanlash bosqichidan boshlash
        } catch(e) {
            console.error("Error loading step:", e);
        }
    </script>

</body>
</html>
